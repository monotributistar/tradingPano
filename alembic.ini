# alembic.ini
# ===========
# Alembic configuration file.
# Run from the project root: `alembic upgrade head`
#
# The sqlalchemy.url below is the default.  It is overridden at runtime by
# api/db/engine.py (which reads DATABASE_URL from the environment) so that
# the app, the CLI, and the test suite all point at the same database.

[alembic]
script_location = alembic
prepend_sys_path = .

# Default DB URL — used only when running the alembic CLI directly.
# When the API starts it passes the live engine URL programmatically.
sqlalchemy.url = sqlite:///data/trading.db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
